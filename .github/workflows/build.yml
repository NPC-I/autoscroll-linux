name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            pkg_ext: deb
            pkg_path: ../autoscroll_*.deb
            deps: build-essential cmake gcc pkg-config debhelper-compat
          - os: fedora-40
            pkg_ext: rpm
            pkg_path: ~/rpmbuild/RPMS/x86_64/autoscroll-*.rpm
            deps: cmake gcc pkg-config rpm-build
          - os: archlinux
            pkg_ext: pkg.tar.zst
            pkg_path: ./*.pkg.tar.zst
            deps: cmake gcc base-devel
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        case "${{ matrix.os }}" in
          ubuntu-*)
            sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }}
            ;;
          fedora-*)
            sudo dnf install -y ${{ matrix.deps }}
            ;;
          archlinux)
            sudo pacman -Syu --noconfirm ${{ matrix.deps }}
            ;;
        esac

    - name: Configure
      run: cmake -B build -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Build package
      run: |
        case "${{ matrix.os }}" in
          ubuntu-*)
            dpkg-buildpackage -b -uc -us
            ;;
          fedora-*)
            mkdir -p ~/rpmbuild/SOURCES
            git archive --format=tar.gz --prefix=autoscroll-linux/ \
              -o ~/rpmbuild/SOURCES/autoscroll-1.0.0.tar.gz HEAD
            rpmbuild -ba --nodeps packaging/autoscroll.spec
            ;;
          archlinux)
            cp -r aur /tmp/aur-build
            cd /tmp/aur-build
            makepkg -si --noconfirm
            ;;
        esac

    - name: Upload package artifact
      uses: actions/upload-artifact@v4
      with:
        name: autoscroll-${{ matrix.os }}-${{ matrix.pkg_ext }}
        path: ${{ matrix.pkg_path }}

  release:
    needs: build
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-24.04
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    - name: Attach to release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          autoscroll-ubuntu-*/*
          autoscroll-fedora-*/*
          autoscroll-archlinux-*
