name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            container: ''
            pkg_ext: deb
            pkg_path: dist/autoscroll_*.deb
            deps: build-essential cmake gcc pkg-config debhelper-compat
          - &fedora
            os: fedora-40
            container: fedora:40
            pkg_ext: rpm
            pkg_path: dist/autoscroll-*.rpm
            deps: cmake gcc pkg-config rpm-build
          - &arch
            os: archlinux
            container: archlinux:latest
            pkg_ext: pkg.tar.zst
            pkg_path: dist/*.pkg.tar.zst
            deps: cmake gcc base-devel
    runs-on: ubuntu-24.04
    container: ${{ matrix.container }}

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        case "${{ matrix.os }}" in
          ubuntu-*)
            sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }}
            ;;
          fedora-*)
            dnf install -y ${{ matrix.deps }}
            ;;
          archlinux)
            pacman -Syu --noconfirm ${{ matrix.deps }}
            ;;
        esac

    - name: Configure
      run: cmake -B build -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Build package
      run: |
        mkdir -p dist
        case "${{ matrix.os }}" in
          ubuntu-*)
            dpkg-buildpackage -b -uc -us
            cp ../autoscroll_*.deb ../autoscroll-dbgsym_*.ddeb dist/ 2>/dev/null || true
            ;;
          fedora-*)
            mkdir -p ~/rpmbuild/SOURCES
            tar czf ~/rpmbuild/SOURCES/autoscroll-1.0.0.tar.gz \
              --transform 's,^,autoscroll-linux/,' \
              --exclude .git \
              .
            rpmbuild -ba --nodeps packaging/autoscroll.spec
            cp ~/rpmbuild/RPMS/x86_64/autoscroll-*.rpm dist/
            ;;
          archlinux)
            useradd -m builduser
            chown -R builduser:builduser .
            su builduser -c "cd aur && MAKEFLAGS='-j$(nproc)' makepkg -s --noconfirm"
            cp aur/*.pkg.tar.zst dist/ 2>/dev/null || true
            ;;
        esac

    - name: Upload package artifact
      uses: actions/upload-artifact@v4
      with:
        name: autoscroll-${{ matrix.os }}-${{ matrix.pkg_ext }}
        path: ${{ matrix.pkg_path }}

  release:
    needs: build
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-24.04
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: autoscroll-*
        merge-multiple: true
    - name: Attach to release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          autoscroll_*.deb
          autoscroll-*.rpm
          *.pkg.tar.zst
